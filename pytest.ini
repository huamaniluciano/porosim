[pytest]
# Configuration for the POROSIM test suite.
testpaths = tests
python_files = test_*.py
addopts = -ra

# Custom markers.
markers =
    slow: end-to-end runs (solver); deselect with -m "not slow"

# Silence two known, noisy warnings from the environment (not failures):
#  - pkg_resources deprecated (emitted by ufl/FEniCS on import)
#  - h5py built against a different HDF5 version
filterwarnings =
    ignore:pkg_resources is deprecated:UserWarning
    ignore:.*h5py is running against HDF5.*:UserWarning
